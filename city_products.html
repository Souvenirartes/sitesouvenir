<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos por Cidade</title>
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="city_products.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script>
    // TODO: Insira suas credenciais do Firebase aqui
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);

    // Restrict access: redirect to login page if user is not authenticated.
    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'login.html';
      }
    });
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="/">Souvenir</a>
    </div>
    <div class="nav-items">
      <a href="index.html" data-i18n="nav_home">Início</a>
      <a href="loja.html" data-i18n="nav_store">Loja Virtual</a>
      <a href="catalogos.html" class="active" data-i18n="nav_catalogs">Catálogos</a>
      <a href="stores.html" data-i18n="nav_stores">Lojas</a>
      <a href="sobre.html" data-i18n="nav_about">Sobre</a>
      <a href="login.html" data-i18n="nav_login">Entrar</a>
    </div>
    <div class="lang-select">
      <span class="lang-icon" data-lang="pt" role="button" aria-label="Português">🇧🇷</span>
      <span class="lang-icon" data-lang="pt" role="button" aria-label="Português (Portugal)">🇵🇹</span>
      <span class="lang-icon" data-lang="es" role="button" aria-label="Español">🇪🇸</span>
    </div>
  </nav>
  <main class="city-products-page">
    <h1 id="city-title">Produtos</h1>
    <div class="product-filters">
      <!-- Search by product name -->
      <input type="text" id="product-search" placeholder="Buscar produto..." aria-label="Buscar produto">
      <!-- Select category (populated dynamically) -->
      <select id="category-filter" aria-label="Filtrar por categoria">
        <option value="">Todas as categorias</option>
      </select>
      <!-- Price range inputs -->
      <input type="number" id="min-price" placeholder="Preço mínimo" min="0" step="0.01" aria-label="Preço mínimo">
      <input type="number" id="max-price" placeholder="Preço máximo" min="0" step="0.01" aria-label="Preço máximo">
    </div>
    <div id="city-product-list" class="product-grid"></div>
  </main>
  <script src="cart.js"></script>
  <script src="city_products.js"></script>
  <script src="lang.js"></script>
</body>
</html>
