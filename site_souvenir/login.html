<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - Souvenir</title>
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="login.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script>
    // TODO: Insira suas credenciais do Firebase aqui
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="/">Souvenir</a>
    </div>
    <div class="nav-items">
      <a href="index.html" data-i18n="nav_home">Início</a>
      <a href="loja.html" data-i18n="nav_store">Loja Virtual</a>
      <a href="catalogos.html" data-i18n="nav_catalogs">Catálogos</a>
      <a href="stores.html" data-i18n="nav_stores">Lojas</a>
      <a href="sobre.html" data-i18n="nav_about">Sobre</a>
      <a href="login.html" class="active" data-i18n="nav_login">Entrar</a>
    </div>
    <!-- Language selector with flag emojis. Both Portuguese flags set lang to 'pt' -->
    <div class="lang-select">
      <span class="lang-icon" data-lang="pt" role="button" aria-label="Português">🇧🇷</span>
      <span class="lang-icon" data-lang="pt" role="button" aria-label="Português (Portugal)">🇵🇹</span>
      <span class="lang-icon" data-lang="es" role="button" aria-label="Español">🇪🇸</span>
    </div>
  </nav>
  <main class="login-page">
    <h1 data-i18n="login_title">Entrar</h1>
    <form id="login-form">
      <div class="field">
        <label for="login-email" data-i18n="login_email_label">E-mail</label>
        <input type="email" id="login-email" required>
      </div>
      <div class="field">
        <label for="login-password" data-i18n="login_password_label">Senha</label>
        <input type="password" id="login-password" required>
      </div>
      <button type="submit" class="btn" data-i18n="login_button">Entrar</button>
    </form>
  </main>
  <script src="login.js"></script>
  <script src="lang.js"></script>
</body>
</html>
